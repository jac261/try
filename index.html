<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0d0f" />
  <title>Try — Triathlon Training</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- React + Babel from CDN: no build step required -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Force the classic JSX runtime so JSX uses the global React.createElement
       instead of emitting an `import "react/jsx-runtime"` (invalid in a plain script). -->
  <script>
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets.react, { runtime: 'classic' }]],
    });
  </script>
</head>
<body>
  <div id="root"></div>
  <!-- domain logic (plain JS) -->
  <script src="js/data.js"></script>
  <script src="js/plan.js"></script>
  <!-- React UI (JSX, transpiled in-browser by Babel) -->
  <script type="text/babel" data-presets="react-classic" src="js/app.jsx"></script>
</body>
</html>
