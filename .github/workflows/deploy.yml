name: Deploy to GitHub Pages

# Build with Vite and deploy the dist/ output whenever main is updated (or run manually).
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes supersede queued ones.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # enablement: turn Pages on (with the GitHub Actions source) if it isn't
        # already — avoids the "Get Pages site failed: Not Found" error and means
        # no manual Settings → Pages toggle is needed.
        with:
          enablement: true

      # Vite emits the production site (base /try/) into dist/.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
